<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チャッピー先生による投資スタイル診断</title>

<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --muted: #8b949e;
  --button: #21262d;
  --button-hover: #30363d;
}

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 24px 16px;
}

.card {
  width: 100%;
  max-width: 520px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 32px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
}

.screen {
  display: none;
}

.screen.active {
  display: block;
}

h1 {
  font-size: clamp(22px, 6vw, 24px);
  line-height: 1.35;
  margin: 0 0 16px;
}

p {
  line-height: 1.7;
  margin: 0 0 18px;
}

button {
  width: 100%;
  margin-top: 12px;
  padding: 14px 16px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--button);
  color: var(--text);
  font-size: 16px;
  line-height: 1.4;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

button:hover {
  background: var(--button-hover);
}

button:active {
  transform: translateY(1px);
}

.small {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.7;
  margin-top: 20px;
}

.result {
  font-size: clamp(18px, 5vw, 20px);
  line-height: 1.7;
  font-weight: 700;
  margin-top: 24px;
  word-break: break-word;
}

@media (max-width: 420px) {
  body {
    align-items: flex-start;
    padding-top: 40px;
  }

  .card {
    padding: 24px 20px;
    border-radius: 16px;
  }
}
</style>
</head>

<body>

<main class="card">

  <section id="q1" class="screen active">
    <h1>チャッピー先生による投資スタイル診断</h1>
    <p>① 資本主義を信じている？</p>
    <button type="button" onclick="answer('capital', true, 'q2')">YES</button>
    <button type="button" onclick="answer('capital', false, 'q2')">NO</button>
  </section>

  <section id="q2" class="screen">
    <h1>質問 2 / 3</h1>
    <p>② 資産をなるべく増やしたい？</p>
    <button type="button" onclick="answer('growth', true, 'q3')">YES</button>
    <button type="button" onclick="answer('growth', false, 'q3')">NO</button>
  </section>

  <section id="q3" class="screen">
    <h1>質問 3 / 3</h1>
    <p>③ 夜はぐっすり寝たい？</p>
    <button type="button" onclick="answer('sleep', true, 'loading')">YES</button>
    <button type="button" onclick="answer('sleep', false, 'loading')">NO</button>
  </section>

  <section id="loading" class="screen">
    <h1>分析中...</h1>
    <p>あなたのスタイルを解析しています。</p>
  </section>

  <section id="result" class="screen">
    <h1>診断結果</h1>
    <div id="resultText" class="result"></div>
    <p class="small">※これは投資助言ではありませんし、生活のするものでもありません。</p>
    <button type="button" onclick="restart()">もう一度診断する</button>
  </section>

</main>

<script>
const answers = {
  capital: null,
  growth: null,
  sleep: null
};

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(function(screen) {
    screen.classList.remove("active");
  });

  document.getElementById(id).classList.add("active");
}

function answer(key, value, nextScreen) {
  answers[key] = value;
  showScreen(nextScreen);

  if (nextScreen === "loading") {
    setTimeout(showResult, 1400);
  }
}

function showResult() {
  let text = "";

  if (answers.capital && answers.growth && answers.sleep) {
    text = "普通の人間や。インデックスでも眺めながら労働がんばるんやで";
  } else if (answers.capital && answers.growth && !answers.sleep) {
    text = "そのテンションで市場に来るな。まず寝るんやで";
  } else if (answers.capital && !answers.growth && answers.sleep) {
    text = "守り重視やな。そのまま平和に寝ててええんやで";
  } else if (answers.capital && !answers.growth && !answers.sleep) {
    text = "慎重なのか壊れてるのか分からん。寝ろ";
  } else if (!answers.capital && answers.growth && answers.sleep) {
    text = "欲張りセットやめろ。怪しい投資話には気をつけるんやで";
  } else if (!answers.capital && answers.growth && !answers.sleep) {
    text = "矛盾してるぞ。寝てから出直んやで";
  } else if (!answers.capital && !answers.growth && answers.sleep) {
    text = "完成形や。何もせず寝てるんやで";
  } else {
    text = "全てを諦めてるやろ。とりあえず寝ろ";
  }

  document.getElementById("resultText").innerText = text;
  showScreen("result");
}

function restart() {
  answers.capital = null;
  answers.growth = null;
  answers.sleep = null;
  showScreen("q1");
}
</script>

</body>
</html>
